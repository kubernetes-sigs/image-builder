# Please see the documentation for all configuration options: https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:

# github-actions
- directory: "/"
  package-ecosystem: "github-actions"
  open-pull-requests-limit: 5
  schedule:
    interval: "weekly"
    time: "09:00"
    # Use America/New_York Standard Time (UTC -05:00)
    timezone: "America/New_York"
  groups:
    all-github-actions:
      patterns: [ "*" ]
  commit-message:
    prefix: "dependabot"
    include: scope
  labels:
    - "ok-to-test"
    - "kind/cleanup"
    - "release-note-none"

# Kubernetes version matrix release pins
- directories:
    - "/images/capi/packer/config/kubernetes-version-dependencies/release-1-31"
    - "/images/capi/packer/config/kubernetes-version-dependencies/release-1-32"
    - "/images/capi/packer/config/kubernetes-version-dependencies/release-1-33"
    - "/images/capi/packer/config/kubernetes-version-dependencies/release-1-34"
    - "/images/capi/packer/config/kubernetes-version-dependencies/release-1-35"
    - "/images/capi/packer/config/kubernetes-version-dependencies/release-1-36"
  package-ecosystem: "gomod"
  open-pull-requests-limit: 5
  schedule:
    interval: "weekly"
    time: "09:00"
    # Use America/New_York Standard Time (UTC -05:00)
    timezone: "America/New_York"
  groups:
    kubernetes-version-matrix-release-pins:
      patterns: [ "*" ]
  ignore:
    - dependency-name: "github.com/containerd/containerd/v2"
      update-types:
        - "version-update:semver-major"
        - "version-update:semver-minor"
    - dependency-name: "github.com/containernetworking/plugins"
      update-types:
        - "version-update:semver-major"
        - "version-update:semver-minor"
    - dependency-name: "github.com/opencontainers/runc"
      update-types:
        - "version-update:semver-major"
        - "version-update:semver-minor"
    - dependency-name: "k8s.io/client-go"
      update-types:
        - "version-update:semver-major"
        - "version-update:semver-minor"
    - dependency-name: "sigs.k8s.io/cri-tools"
      update-types:
        - "version-update:semver-major"
        - "version-update:semver-minor"
  commit-message:
    prefix: "dependabot"
    include: scope
  labels:
    - "ok-to-test"
    - "kind/cleanup"
    - "release-note-none"

# Kubernetes version matrix rolling latest
- directories:
    - "/images/capi/packer/config/kubernetes-version-dependencies/latest"
  package-ecosystem: "gomod"
  open-pull-requests-limit: 3
  schedule:
    interval: "weekly"
    time: "09:00"
    # Use America/New_York Standard Time (UTC -05:00)
    timezone: "America/New_York"
  groups:
    kubernetes-version-matrix-latest:
      patterns: [ "*" ]
  ignore:
    - dependency-name: "github.com/containerd/containerd/v2"
      update-types:
        - "version-update:semver-major"
    - dependency-name: "github.com/containernetworking/plugins"
      update-types:
        - "version-update:semver-major"
    - dependency-name: "github.com/opencontainers/runc"
      update-types:
        - "version-update:semver-major"
    - dependency-name: "k8s.io/client-go"
      update-types:
        - "version-update:semver-major"
    - dependency-name: "sigs.k8s.io/cri-tools"
      update-types:
        - "version-update:semver-major"
  commit-message:
    prefix: "dependabot"
    include: scope
  labels:
    - "ok-to-test"
    - "kind/cleanup"
    - "release-note-none"

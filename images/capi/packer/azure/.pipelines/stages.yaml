# Required pipeline variables:
# - AZURE_CLIENT_ID_VHD - Service principal ID to build the vhd
# - AZURE_CLIENT_SECRET_VHD - Service principal secret to build the vhd
# - AZURE_SUBSCRIPTION_ID_VHD - Subscription ID to build the vhd
# - AZURE_TENANT_ID_VHD - tenant ID to build the vhd
# - BUILD_POOL - Azure DevOps build pool to use
# - IDENTITY_NAME - name of the identity to use
# - IDENTITY_RESOURCE_GROUP - resource group of the identity to use
# - KUBERNETES_VERSION - version of Kubernetes to build the image with, e.g. `1.31.1`
# - OFFER - the name of the offer to create the sku for
# - OS - target of build, one of `Ubuntu` or `Windows`
# - OS_VERSION - target of build, one of `24.04`, `22.04`, `2022-containerd`, or `2019-containerd`
# - PUBLISHER - the name of the publisher to create the sku for
# - RESOURCE_GROUP - name of the Azure resource group to use for the Compute galleries
# - STAGING_GALLERY_NAME - name of the Azure Compute Gallery for initial image publishing

trigger: none
pr: none

stages:
  - stage: build
    jobs:
    - template: build-sig.yaml
    variables:
      AZURE_TENANT_ID: $(AZURE_TENANT_ID_VHD)
      AZURE_CLIENT_ID: $(AZURE_CLIENT_ID_VHD)
      AZURE_CLIENT_SECRET: $(AZURE_CLIENT_SECRET_VHD)
      AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID_VHD)

  - stage: test
    jobs:
    - template: test-sig.yaml
    variables:
      AZURE_TENANT_ID: $(AZURE_TENANT_ID_VHD)
      AZURE_CLIENT_ID: $(AZURE_CLIENT_ID_VHD)
      AZURE_CLIENT_SECRET: $(AZURE_CLIENT_SECRET_VHD)
      AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID_VHD)

  - stage: promote
    jobs:
    - template: promote-sig.yaml
    variables:
      AZURE_TENANT_ID: $(AZURE_TENANT_ID_VHD)
      AZURE_CLIENT_ID: $(AZURE_CLIENT_ID_VHD)
      AZURE_CLIENT_SECRET: $(AZURE_CLIENT_SECRET_VHD)
      AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID_VHD)

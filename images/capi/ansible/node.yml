---
- name: Provision node
  hosts: all
  become: true
  vars:
    node_custom_roles_pre: ""
    node_custom_roles_post: ""
    custom_role_names: ""
    system: linux
    arch_uname: "{{ ansible_architecture }}"
    arch: "{{ {'x86_64': 'amd64', 'amd64': 'amd64', 'aarch64': 'arm64', 'arm64': 'arm64', 'ppc64le': 'ppc64le'}.get(arch_uname, 'unsupported') }}"

  tasks:
    - name: Include pre-node custom roles
      ansible.builtin.include_role:
        name: "{{ role }}"
      loop: "{{ node_custom_roles_pre.split() }}"
      loop_control:
        loop_var: role
      when: node_custom_roles_pre != ""
    - name: Include node role
      ansible.builtin.include_role:
        name: node
    - name: Include providers role
      ansible.builtin.include_role:
        name: providers
    - name: Include containerd role
      ansible.builtin.include_role:
        name: containerd
    - name: Include kubernetes role
      ansible.builtin.include_role:
        name: kubernetes
    - name: Include load_additional_components role
      ansible.builtin.include_role:
        name: load_additional_components
      when: load_additional_components | bool
    - name: Include ecr_credential_provider role
      ansible.builtin.include_role:
        name: ecr_credential_provider
      when: ecr_credential_provider | bool
    - name: Include post-node custom roles
      ansible.builtin.include_role:
        name: "{{ role }}"
      loop: "{{ custom_role_names.split() + node_custom_roles_post.split() }}"
      loop_control:
        loop_var: role
      when: custom_role_names != "" or node_custom_roles_post != ""
    - name: Include sysprep role
      ansible.builtin.include_role:
        name: sysprep
    - name: Include post-sysprep custom roles
      ansible.builtin.include_role:
        name: "{{ role }}"
      loop: "{{ node_custom_roles_post_sysprep.split() }}"
      loop_control:
        loop_var: role
      when: node_custom_roles_post_sysprep != ""

  environment:
    http_proxy: "{{ http_proxy | default('') }}"
    https_proxy: "{{ https_proxy | default('') }}"
    no_proxy: "{{ no_proxy | default('') }}"
    HTTP_PROXY: "{{ http_proxy | default('') }}"
    HTTPS_PROXY: "{{ https_proxy | default('') }}"
    NO_PROXY: "{{ no_proxy | default('') }}"
    PYTHONPATH: "{{ python_path }}"

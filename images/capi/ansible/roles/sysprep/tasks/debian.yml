---
- name: Define file modes
  ansible.builtin.set_fact:
    last_log_mode: "0664"
    machine_id_mode: "0644"

- name: Get installed packages
  ansible.builtin.package_facts:

- name: Disable apt-daily timers
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - apt-daily.timer
    - apt-daily-upgrade.timer

- name: Stop apt-daily services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
  loop:
    - apt-daily.service
    - apt-daily-upgrade.service

- name: Disable unattended upgrades if installed
  ansible.builtin.systemd:
    name: unattended-upgrades
    state: stopped
    enabled: false
  when: "'unattended-upgrades' in ansible_facts.packages"

# The apt-daily/unattended-upgrades services may still be running from before
# they were disabled above. Retry package selection changes until the dpkg frontend
# lock is released to avoid a flaky race with concurrent apt activity.
- name: Define installed packages for package selection changes
  ansible.builtin.set_fact:
    sysprep_installed_packages: "{{ ansible_facts.packages.keys() | list | sort }}"
    sysprep_grub_packages: "{{ ansible_facts.packages.keys() | select('search', 'grub') | list | sort }}"
  when: sysprep_hold_installed_packages | default(true) | bool

# ansible.builtin.dpkg_selections only changes one package per module call.
# Feed dpkg's native batch format once to avoid hundreds of SSH round trips.
- name: Pin all installed packages
  ansible.builtin.command:
    cmd: dpkg --set-selections
    stdin: "{{ sysprep_installed_packages | map('regex_replace', '$', ' hold') | join('\n') }}"
  register: sysprep_dpkg_selections_hold
  until: sysprep_dpkg_selections_hold is not failed
  retries: 30
  delay: 10
  changed_when: sysprep_installed_packages | length > 0
  when:
    - sysprep_hold_installed_packages | default(true) | bool
    - sysprep_installed_packages | length > 0

- name: Unpin grub packages for MaaS
  ansible.builtin.command:
    cmd: dpkg --set-selections
    stdin: "{{ sysprep_grub_packages | map('regex_replace', '$', ' install') | join('\n') }}"
  register: sysprep_dpkg_selections_unhold_grub
  until: sysprep_dpkg_selections_unhold_grub is not failed
  retries: 30
  delay: 10
  changed_when: sysprep_grub_packages | length > 0
  when:
    - sysprep_hold_installed_packages | default(true) | bool
    - sysprep_grub_packages | length > 0
    - provider is defined and provider is search('maas')

- name: Remove extra repos
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/{{ item | basename }}
    state: absent
  loop: "{{ extra_repos.split() }}"
  when:
    - remove_extra_repos|default(false)|bool
    - extra_repos != ""

- name: Find disabled repo files
  ansible.builtin.find:
    depth: 1
    paths:
      - /etc/apt
      - /etc/apt/sources.list.d
    patterns: "*.list.disabled"
  register: repo_files
  when: (disable_public_repos | default(false, true) | bool) and (reenable_public_repos | default(true, true) | bool)

- name: Enable repos
  ansible.builtin.command: mv {{ item.path }} {{ item.path | regex_replace('.disabled') }}
  loop: "{{ repo_files.files }}"
  when: (disable_public_repos | default(false, true) | bool) and (reenable_public_repos | default(true, true) | bool)

- name: Remove templated apt.conf.d/90proxy used for http(s)_proxy support
  ansible.builtin.file:
    path: /etc/apt/apt.conf.d/90proxy
    state: absent
  when: http_proxy is defined or https_proxy is defined

- name: Get installed service
  ansible.builtin.service_facts:

- name: Stop auditing
  ansible.builtin.service:
    name: rsyslog
    state: stopped
  when: "'rsyslog' in ansible_facts.services"

- name: Remove apt package caches
  ansible.builtin.apt:
    autoclean: true
    autoremove: true
    force_apt_get: true
    lock_timeout: 300

- name: Remove apt package lists
  ansible.builtin.file:
    state: "{{ item.state }}"
    path: "{{ item.path }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { path: /var/lib/apt/lists, state: absent, mode: "0755" }
    - { path: /var/lib/apt/lists, state: directory, mode: "0755" }

- name: Reset network interface IDs
  ansible.builtin.file:
    state: absent
    path: /etc/udev/rules.d/70-persistent-net.rules

- name: Determine if update-grub is present
  ansible.builtin.stat:
    path: /usr/sbin/update-grub
  register: _stat_update_grub

- name: Configure grub for non graphical consoles and add user extra kernel boot params
  ansible.builtin.template:
    src: templates/etc/default/grub.d/50-cloudimg-settings.cfg
    dest: /etc/default/grub.d/50-cloudimg-settings.cfg
    group: root
    owner: root
    mode: "0644"
  notify:
    - Update debian grub
  when:
    - _stat_update_grub.stat.exists
    - sysprep_require_grub_file|default(true)|bool

- name: Removing subiquity disable cloud-init networking config
  ansible.builtin.file:
    path: /etc/cloud/cloud.cfg.d/subiquity-disable-cloudinit-networking.cfg
    state: absent
  when: ansible_facts['distribution_version'] is version('22.04', '>=')

- name: Removing 99-installer.cfg which sets the cloud-init datasource to None
  ansible.builtin.file:
    path: /etc/cloud/cloud.cfg.d/99-installer.cfg
    state: absent
  when: ansible_facts['distribution_version'] is version('22.04', '>=')

- name: Removing subiquity curtin preserve sources config
  ansible.builtin.file:
    path: /etc/cloud/cloud.cfg.d/curtin-preserve-sources.cfg
    state: absent
  when: ansible_facts['distribution_version'] is version('22.04', '>=')

- name: Removing cloud-init ds identify config
  ansible.builtin.file:
    path: /etc/cloud/ds-identify.cfg
    state: absent
  when: ansible_facts['distribution_version'] is version('22.04', '>=')

- name: Removing 90-installer-network.cfg installer network configuration
  ansible.builtin.file:
    path: /etc/cloud/cloud.cfg.d/90-installer-network.cfg
    state: absent
  when: ansible_facts['distribution_version'] is version('22.04', '>=')

---
- name: Create CNI directory
  ansible.builtin.file:
    state: directory
    path: /opt/cni/bin
    mode: "0755"
    owner: root
    group: root

- name: Download CNI tarball
  ansible.builtin.get_url:
    url: "{{ kubernetes_cni_http_source }}/{{ kubernetes_cni_semver }}/cni-plugins-linux-{{ kubernetes_resolved_arch }}-{{ kubernetes_cni_semver }}.tgz"
    checksum: "{{ kubernetes_cni_http_checksum }}"
    dest: /tmp/cni.tar.gz
    mode: "0755"
    owner: root
    group: root

- name: Install CNI
  ansible.builtin.unarchive:
    remote_src: true
    dest: /opt/cni/bin
    src: /tmp/cni.tar.gz

- name: Remove CNI tarball
  ansible.builtin.file:
    state: absent
    path: /tmp/cni.tar.gz

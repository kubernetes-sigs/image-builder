---
- name: Add the Kubernetes repo
  ansible.builtin.yum_repository:
    name: kubernetes
    description: the kubernetes yum repo
    baseurl: "{{ kubernetes_rpm_repo }}"
    gpgcheck: "{{ kubernetes_rpm_gpg_check }}"
    gpgkey: "{{ kubernetes_rpm_gpg_key }}"

- name: Import the Kubernetes RPM repository key
  ansible.builtin.rpm_key:
    state: present
    key: "{{ kubernetes_rpm_gpg_key }}"
  when: kubernetes_rpm_gpg_check | bool

- name: Install Kubernetes
  ansible.builtin.dnf:
    name: "{{ packages }}"
    allow_downgrade: true
    state: present
    lock_timeout: 60
    disable_excludes: "kubernetes"
    disable_plugin: "priorities"
  vars:
    packages:
      - kubelet-{{ kubernetes_rpm_version }}
      - kubeadm-{{ kubernetes_rpm_version }}
      - kubectl-{{ kubernetes_rpm_version }}

- name: Install Kubernetes CNI package
  ansible.builtin.dnf:
    name: kubernetes-cni{{ '-' + kubernetes_cni_rpm_version if kubernetes_cni_rpm_version else '' }}
    allow_downgrade: true
    state: present
    lock_timeout: 60
    disable_excludes: "kubernetes"
    disable_plugin: "priorities"
  when: kubernetes_cni_source_type | default("pkg") == "pkg"

---
- name: Add the Kubernetes repo
  ansible.builtin.deb822_repository:
    name: kubernetes
    types:
      - deb
    uris:
      - "{{ kubernetes_deb_repo }}"
    suites:
      - /
    signed_by: "{{ kubernetes_deb_gpg_key }}"
    state: present
    mode: "0644"
  notify: Update apt cache

- name: Flush handlers after adding the Kubernetes repo
  ansible.builtin.meta: flush_handlers

- name: Install Kubernetes
  ansible.builtin.apt:
    name: "{{ packages }}"
    allow_downgrade: true
  vars:
    packages:
      - kubelet={{ kubernetes_deb_version }}
      - kubeadm={{ kubernetes_deb_version }}
      - kubectl={{ kubernetes_deb_version }}

# kubernetes-cni is installed independently of kubernetes_source_type; see
# cni-pkg.yml, which is imported based solely on kubernetes_cni_source_type.

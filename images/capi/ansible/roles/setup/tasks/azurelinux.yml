---
- name: Import RPM repository tasks
  ansible.builtin.import_tasks: rpm_repos.yml

- name: Install python3-libdnf5 for Azure Linux 4+
  ansible.builtin.raw: tdnf install -y python3-libdnf5
  register: install_libdnf5
  changed_when: "'Nothing to do' not in install_libdnf5.stdout"
  when: ansible_facts['os_family'] == "Azure Linux"

- name: Perform a tdnf update  # noqa: package-latest
  ansible.builtin.dnf:
    name: "*"
    state: latest
    lock_timeout: 60
  register: dnf_lock_status
  until: dnf_lock_status is not failed
  retries: 5
  delay: 10

- name: Install baseline dependencies on Azure Linux
  ansible.builtin.dnf:
    name: "{{ rpms }}"
    state: present
    lock_timeout: 60
  register: dnf_lock_status
  until: dnf_lock_status is not failed
  retries: 5
  delay: 10

- name: Install extra rpms
  ansible.builtin.dnf:
    name: "{{ extra_rpms.split() }}"
    state: present
    lock_timeout: 60
  register: dnf_lock_status
  until: dnf_lock_status is not failed
  retries: 5
  delay: 10

---
- name: Install Azure CLI
  when: ansible_facts['os_family'] == "Debian"
  block:
    - name: Ensure /etc/apt/keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Microsoft Package Repository Key (armored)
      ansible.builtin.get_url:
        url: https://packages.microsoft.com/keys/microsoft.asc
        dest: /etc/apt/keyrings/microsoft.asc
        mode: "0644"

    - name: Dearmor Microsoft Package Repository Key
      ansible.builtin.shell: >
        gpg --dearmor < /etc/apt/keyrings/microsoft.asc
        > /etc/apt/keyrings/microsoft.gpg
      args:
        creates: /etc/apt/keyrings/microsoft.gpg

    - name: Find Ubuntu Version
      ansible.builtin.command:
        cmd: lsb_release -cs
      register: ubuntu_version
      changed_when: false

    - name: Find Host Architecture
      ansible.builtin.command:
        cmd: dpkg --print-architecture
      register: host_arch
      changed_when: false

    - name: Map unsupported codenames to nearest supported codename
      ansible.builtin.set_fact:
        azure_cli_codename: "{{ 'noble' if ubuntu_version.stdout == 'resolute' else ubuntu_version.stdout }}"

    - name: Add Microsoft Package Repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ host_arch.stdout }} signed-by=/etc/apt/keyrings/microsoft.gpg]
          https://packages.microsoft.com/repos/azure-cli/
          {{ azure_cli_codename }} main
        state: present
        update_cache: true

    - name: Install Azure CLI
      ansible.builtin.apt:
        name: azure-cli
        state: present

- name: Install Azure CLI
  when: ansible_facts['os_family'] in ["Common Base Linux Mariner", "Microsoft Azure Linux"]
  ansible.builtin.package:
    name: azure-cli
    state: present

- name: Install Azure CLI
  when: ansible_facts['os_family'] == "RedHat"
  block:
    - name: Import the Microsoft repository key
      ansible.builtin.rpm_key:
        key: https://packages.microsoft.com/keys/microsoft.asc
        state: present

    - name: Add the yum repository for the azure cli
      ansible.builtin.yum_repository:
        name: azure_cli
        description: Azure CLI
        baseurl: https://packages.microsoft.com/yumrepos/azure-cli
        gpgkey: https://packages.microsoft.com/keys/microsoft.asc
        gpgcheck: true
        enabled: true

    - name: Install Azure CLI
      ansible.builtin.package:
        name: azure-cli
        state: present

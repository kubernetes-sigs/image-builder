---

- name: Install Falco on Debian based systems
  when: ansible_facts['os_family'] == "Debian"
  block:
    - name: Ensure /etc/apt/keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Falco package signing key (armored)
      ansible.builtin.get_url:
        url: https://falco.org/repo/falcosecurity-packages.asc
        dest: /etc/apt/keyrings/falcosecurity.asc
        mode: "0644"

    - name: Dearmor Falco package signing key
      ansible.builtin.shell: >
        gpg --dearmor < /etc/apt/keyrings/falcosecurity.asc
        > /etc/apt/keyrings/falcosecurity.gpg
      args:
        creates: /etc/apt/keyrings/falcosecurity.gpg

    - name: Add Falco apt repo
      ansible.builtin.apt_repository:
        repo: deb [signed-by=/etc/apt/keyrings/falcosecurity.gpg] https://download.falco.org/packages/deb stable main
        state: present
        filename: falcosecurity

    - name: Install Falco requirements
      ansible.builtin.apt:
        pkg:
          - dkms
          - make
          - "linux-headers-{{ ansible_facts['kernel'] }}"
          - clang
          - llvm
        update_cache: true
        state: present
      ignore_errors: true
      register: pkg_result
      until: pkg_result is success

- name: Install Falco on RedHat based systems
  when: ansible_facts['os_family'] == "RedHat"
  block:
    - name: Add Falco YUM repo
      ansible.builtin.yum_repository:
        name: Falco repository
        description: Falco YUM repo
        file: falcosecurity
        baseurl: https://falco.org/repo/falcosecurity-rpm.repo
        gpgcheck: true
        enabled: true
        gpgkey: https://falco.org/repo/falcosecurity-packages.asc

    - name: Install Falco requirements
      ansible.builtin.dnf:
        pkg:
          - dkms
          - make
          - "kernel-devel-{{ ansible_facts['kernel'] }}"
          - clang
          - llvm
          - dialog
        state: present
      ignore_errors: true
      register: pkg_result
      until: pkg_result is success

- name: Install Falco
  ansible.builtin.package:
    name: falco
    state: present
  when: ansible_facts['os_family'] == "Debian" or ansible_facts['os_family'] == "RedHat"

- name: Enable Falco Modern eBPF
  ansible.builtin.service:
    name: falco-modern-bpf
    state: started
    enabled: true
  when: ansible_facts['os_family'] == "Debian" or ansible_facts['os_family'] == "RedHat"

---

- name: Install Trivy on Debian based systems
  when: ansible_facts['os_family'] == "Debian"
  block:
    - name: Ensure /etc/apt/keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Trivy package signing key (armored)
      ansible.builtin.get_url:
        url: https://aquasecurity.github.io/trivy-repo/deb/public.key
        dest: /etc/apt/keyrings/trivy.asc
        mode: "0644"

    - name: Dearmor Trivy package signing key
      ansible.builtin.shell: >
        gpg --dearmor < /etc/apt/keyrings/trivy.asc
        > /etc/apt/keyrings/trivy.gpg
      args:
        creates: /etc/apt/keyrings/trivy.gpg

    - name: Add Trivy apt repo
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb {{ ansible_facts['distribution_release'] }} main"
        state: present
        filename: trivy

- name: Install Trivy on RedHat based systems
  when: ansible_facts['os_family'] == "RedHat"
  block:
    - name: Add Trivy rpm repo
      ansible.builtin.yum_repository:
        name: Trivy repository
        description: Trivy YUM repo
        file: trivy
        baseurl: https://aquasecurity.github.io/trivy-repo/rpm/releases/{{ ansible_facts['distribution_release'] }}/{{ ansible_facts['architecture'] }}/
        gpgcheck: true
        enabled: true
        gpgkey: https://aquasecurity.github.io/trivy-repo/rpm/public.keyy

- name: Install Trivy
  ansible.builtin.package:
    name: trivy
    update_cache: true
    state: present
  when: ansible_facts['os_family'] == "Debian" or ansible_facts['os_family'] == "RedHat"

- name: Update Trivy DB to ensure latest records are available as of now
  ansible.builtin.command: trivy rootfs --download-db-only
  args:
    creates: ~/.cache/trivy/db/trivy.db
  when: ansible_facts['os_family'] == "Debian" or ansible_facts['os_family'] == "RedHat"

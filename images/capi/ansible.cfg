[defaults]
remote_tmp = /tmp/.ansible
display_skipped_hosts = False
inject_facts_as_vars = False
timeout = 120

[ssh_connection]
pipelining = True
retries = 5
# No ControlMaster/ControlPersist: the GitHub-hosted runner -> Azure VM path is
# flaky, and a persistent multiplexed master can wedge (half-open) and hang the
# whole build. A fresh connection per task lets `retries` reconnect cleanly.
ssh_args = -o ServerAliveInterval=15 -o ServerAliveCountMax=3 -o ConnectTimeout=30 -o ConnectionAttempts=3 -o TCPKeepAlive=yes
